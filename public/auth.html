<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SourceMate — вход</title>
    <meta name="description" content="Вход и регистрация SourceMate.">
    <link rel="stylesheet" href="./auth.css">
  </head>
  <body>
    <main class="auth-page" data-view="login">
      <a class="auth-logo" href="./index.html" aria-label="SourceMate">
        <span></span>
        <strong>SourceMate</strong>
      </a>

      <section class="auth-copy" aria-live="polite">
        <h1 id="auth-title">Вход в личный кабинет</h1>
        <p id="auth-subtitle">Введите почту и пароль, чтобы продолжить работу с вашими темами и источниками</p>
      </section>

      <section class="auth-card" aria-label="Форма авторизации">
        <div id="auth-card-content"></div>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
